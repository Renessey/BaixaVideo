<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baixador de Vídeo</title>

    <style>
        /* Ajuste global para evitar que padding aumente o tamanho dos elementos */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0f172a;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            padding: 20px;
            width: 100%;
            /* Permite scroll horizontal se o conteúdo for muito largo em telas minúsculas */
            overflow-x: auto; 
            min-height: 100vh;
        }

        h1 { 
            color: #60a5fa; 
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        /* Container para garantir que nada ultrapasse o limite */
        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }

        input {
            width: 100%; /* Ocupa o máximo do container */
            max-width: 400px;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #1e293b;
            background: #1e293b;
            color: white;
            outline: none;
            margin-bottom: 10px;
        }

        input:focus { border-color: #2563eb; }

        .btn-group {
            display: flex;
            flex-wrap: wrap; /* Faz os botões pularem linha se não couberem */
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            padding: 12px 24px;
            background: #2563eb;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
            /* Garante que o botão não encolha demais */
            white-space: nowrap; 
        }

        button:hover { background: #1d4ed8; }

        img {
            margin-top: 20px;
            width: 100%;
            max-width: 350px; /* Limite de tamanho da thumbnail */
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        select {
            padding: 10px;
            margin-top: 15px;
            border-radius: 6px;
            background: #1e293b;
            color: white;
            border: 1px solid #334155;
            width: 100%;
            max-width: 200px;
        }

        #progressBox {
            width: 100%;
            max-width: 400px;
            height: 25px;
            background: #1e293b;
            margin: 20px auto;
            border-radius: 10px;
            overflow: hidden;
            display: none;
            border: 1px solid #334155;
        }

        #progressBar {
            height: 100%;
            width: 0%;
            background: #22c55e;
            transition: width 0.3s;
        }

        .loading-text {
            color: #60a5fa;
            font-weight: bold;
            margin: 20px 0;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        #status { margin-top: 10px; font-weight: bold; padding: 0 10px; }
        #percent { font-size: 0.9rem; margin-top: 5px; }

    </style>
</head>

<body>

    <div class="container">
        <h1>Baixador de Vídeo</h1>

        <input id="url" type="text" placeholder="Cole o link do vídeo aqui...">
        
        <div class="btn-group">
            <button onclick="buscar()">Buscar Vídeo</button>
        </div>

        <div id="resultado"></div>

        <div id="progressBox">
            <div id="progressBar"></div>
        </div>

        <p id="percent"></p>
        <p id="status"></p>
    </div>

    <script>
        let videoUrl = "";
        let timer = null;

        function buscar() {
            const urlInput = document.getElementById("url").value;
            const resultadoDiv = document.getElementById("resultado");

            if (!urlInput) {
                alert("Por favor, cole um link válido.");
                return;
            }

            videoUrl = urlInput;
            resultadoDiv.innerHTML = `<p class="loading-text">Buscando informações do vídeo... Aguarde.</p>`;
            
            document.getElementById("progressBox").style.display = "none";
            document.getElementById("status").innerText = "";
            document.getElementById("percent").innerText = "";

            fetch("/info", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ url: urlInput })
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    resultadoDiv.innerHTML = `<p style="color: #f87171;">Erro: ${data.error}</p>`;
                    return;
                }

                let html = `
                    <h2 style="font-size: 1.2rem; margin-top: 20px; padding: 0 10px;">${data.title}</h2>
                    <img src="${data.thumbnail}">
                    <br>
                    <select id="res">
                        ${data.formats.map(f => `<option value="${f.height}">${f.res}</option>`).join("")}
                    </select>
                    <div class="btn-group">
                        <button onclick="baixarVideo()">Baixar Vídeo</button>
                        <button onclick="baixarMP3()" style="background: #475569;">Baixar MP3</button>
                    </div>
                `;
                resultadoDiv.innerHTML = html;
            })
            .catch(err => {
                resultadoDiv.innerHTML = `<p style="color: #f87171;">Erro na conexão com o servidor.</p>`;
            });
        }

        function acompanhar() {
            document.getElementById("progressBox").style.display = "block";
            document.getElementById("status").innerText = "Iniciando download...";

            if (timer) clearInterval(timer);

            timer = setInterval(() => {
                fetch("/progress")
                    .then(r => r.json())
                    .then(data => {
                        document.getElementById("progressBar").style.width = data.percent + "%";
                        document.getElementById("percent").innerText = data.percent + "%";

                        if (data.percent >= 100) {
                            clearInterval(timer);
                            document.getElementById("status").innerText = "Concluído!";
                        }
                    });
            }, 1000);
        }

        function baixarVideo() {
            let res = document.getElementById("res").value;
            acompanhar();
            window.location = `/download?url=${encodeURIComponent(videoUrl)}&res=${res}&tipo=video`;
        }

        function baixarMP3() {
            acompanhar();
            window.location = `/download?url=${encodeURIComponent(videoUrl)}&tipo=mp3`;
        }
    </script>

</body>
</html>
